name: Refresh Dashboard

on:
  schedule:
    # Every 6 hours, at minute 7 to avoid the round-hour cron rush.
    # UTC times: 00:07, 06:07, 12:07, 18:07
    - cron: '7 */6 * * *'
  workflow_dispatch:  # Manual trigger via GitHub Actions UI

permissions:
  contents: write  # Required so the job can commit & push refreshed files

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run refresh
        env:
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
        run: python refresh.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data_status.json index.html dashboard-public.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
